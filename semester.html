<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Subject | BSc Nexus</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="brand">🧬 BSc Nexus</a>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="globalSearch" class="search-input" placeholder="Search subjects...">
        </div>
    </nav>

    <main class="app-container">
        <div style="margin-bottom: 1.5rem;"><a href="index.html" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">← Back to Semesters</a></div>
        <h2 class="section-title" id="semTitle">Semester Roadmap</h2>
        
        <div class="grid-responsive" id="subjectsGrid">
            <!-- Dynamic targets filled via app query parameters reliably -->
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const { sem } = getUrlParams();
            if(!sem) { window.location.href = "index.html"; return; }
            
            document.getElementById("semTitle").innerText = `Semester ${sem} : Choose Subject`;
            
            const subjects = ["Physics", "Chemistry", "Botany", "Zoology", "Maths"];
            const icons = ["⚛️", "🧪", "🌿", "🦁", "🧮"];
            const grid = document.getElementById("subjectsGrid");
            
            subjects.forEach((sub, i) => {
                const lowerSub = sub.toLowerCase();
                const panel = document.createElement("div");
                panel.className = "glass-panel";
                panel.setAttribute("data-searchable", sub);
                panel.innerHTML = `
                    <a href="subject.html?sem=${sem}&subject=${lowerSub}" class="card-clickable">
                        <div class="card-icon" style="font-size: 1.25rem">${icons[i]}</div>
                        <h3>${sub}</h3>
                        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem;">Complete 5 Unit structural syllabus notes access.</p>
                    </a>
                `;
                grid.appendChild(panel);
            });
        });
    </script>
</body>
</html>
